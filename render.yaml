services:\n  - type: web\n    name: investcontrol\n    runtime: python\n    plan: free\n    buildCommand: pip install -r requirements.txt\n    startCommand: gunicorn wsgi:application\n    envVars:\n      - key: PYTHON_VERSION\n        value: 3.13.13\n      - key: DATA_DIR\n        value: /var/data\n      - key: SECRET_KEY\n        generateValue: true\n      - key: DEFAULT_EMAIL\n        value: admin@investcontrol.app\n      - key: DEFAULT_PASSWORD\n        value: 123456\n    disk:\n      name: investcontrol-data\n      mountPath: /var/data\n      sizeGB: 1\n